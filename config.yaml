# OpenContext Configuration
# ==========================
#
# ESRI Living Atlas MCP — derived from config-example.yaml.
#
# IMPORTANT: Enable ONLY ONE plugin per fork/deployment (One Fork = One MCP Server).
# See docs/ARCHITECTURE.md for details.

---
# Server metadata
server_name: "ESRI Living Atlas MCP"
description: >-
  Discovery + query surface over ArcGIS Living Atlas of the World -- Esri's
  curated catalog of authoritative geographic content (feature layers,
  imagery, boundaries, demographics, environment, live feeds, and 100+
  pretrained GeoAI models). Unofficial community on-ramp using the public
  sharing REST API; read-only, anonymous, premium content out of scope.
organization: "Code for Anchorage"

# Plugin configuration
# ====================
#
# IMPORTANT: Enable ONLY ONE plugin below
# For additional MCP servers, fork this repository again
#
plugins:
  # Built-in: ArcGIS Living Atlas of the World (www.arcgis.com)
  # The group_id scopes every catalog query to the Living Atlas curation
  # group; the category_set_item_id holds the category taxonomy. Both were
  # determined empirically from the official browse app -- see
  # docs/CATALOG_NOTES.md before changing them.
  living_atlas:
    enabled: true
    portal_url: "https://www.arcgis.com"
    group_id: "47dd57c9a59d458c86d3d6b978560088"
    category_set_item_id: "1ad6b64fe4e1428a8f182dd6010fc2c9"
    # 25s, not 120: API Gateway hard-caps responses at 29s, so an upstream
    # timeout must fire BEFORE that to reach the client as a clean JSON-RPC
    # error instead of an opaque 504. Normal AGO queries finish in <5s.
    timeout: 25
    search_cache_ttl: 600 # ~10 min: the catalog updates continuously
    metadata_cache_ttl: 3600 # ~1 h: item metadata / schemas / taxonomy
    max_query_records: 500 # server-side cap; many LA layers are global

  # Built-in: ArcGIS Enterprise portal (kept for reference; disabled)
  arcgis:
    enabled: false
    portal_url: "https://geo.sandag.org/portal"
    services_url: "https://geo.sandag.org/server/rest/services"
    city_name: "the San Diego region"
    timeout: 25

# AWS deployment settings
aws:
  region: "us-west-2" # AWS region for Lambda
  lambda_name: "living-atlas-mcp" # Lambda function name
  lambda_memory: 512 # Lambda memory in MB (128-10240)
  lambda_timeout: 120 # Lambda timeout in seconds (max 900)

# Logging configuration
logging:
  level: "INFO" # Log level: DEBUG, INFO, WARNING, ERROR
  format: "json" # Log format: json or text
